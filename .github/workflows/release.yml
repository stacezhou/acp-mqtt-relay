name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  BIN_NAME: amr
  CARGO_TERM_COLOR: always

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: meta
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$version" ]]; then
            echo "Failed to determine version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-darwin-aarch64:
    needs: meta
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build aarch64 macOS binary
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Package aarch64 macOS binary
        shell: bash
        run: |
          version="${{ needs.meta.outputs.version }}"
          package="amr-v${version}-darwin-aarch64"

          mkdir -p "dist/${package}"
          cp "target/aarch64-apple-darwin/release/${BIN_NAME}" "dist/${package}/${BIN_NAME}"
          cp LICENSE README.md "dist/${package}/"
          chmod +x "dist/${package}/${BIN_NAME}"

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - uses: actions/upload-artifact@v4
        with:
          name: amr-v${{ needs.meta.outputs.version }}-darwin-aarch64
          path: dist/amr-v${{ needs.meta.outputs.version }}-darwin-aarch64.tar.gz
          if-no-files-found: error

  build-darwin-x86_64:
    needs: meta
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build x86_64 macOS binary
        run: cargo build --locked --release --target x86_64-apple-darwin

      - name: Package x86_64 macOS binary
        shell: bash
        run: |
          version="${{ needs.meta.outputs.version }}"
          package="amr-v${version}-darwin-x86_64"

          mkdir -p "dist/${package}"
          cp "target/x86_64-apple-darwin/release/${BIN_NAME}" "dist/${package}/${BIN_NAME}"
          cp LICENSE README.md "dist/${package}/"
          chmod +x "dist/${package}/${BIN_NAME}"

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - uses: actions/upload-artifact@v4
        with:
          name: amr-v${{ needs.meta.outputs.version }}-darwin-x86_64
          path: dist/amr-v${{ needs.meta.outputs.version }}-darwin-x86_64.tar.gz
          if-no-files-found: error

  build-darwin-universal:
    needs:
      - meta
      - build-darwin-aarch64
      - build-darwin-x86_64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: amr-v${{ needs.meta.outputs.version }}-darwin-aarch64
          path: incoming/aarch64

      - uses: actions/download-artifact@v4
        with:
          name: amr-v${{ needs.meta.outputs.version }}-darwin-x86_64
          path: incoming/x86_64

      - name: Create universal macOS binary
        shell: bash
        run: |
          version="${{ needs.meta.outputs.version }}"
          arm_package="amr-v${version}-darwin-aarch64"
          x64_package="amr-v${version}-darwin-x86_64"
          universal_package="amr-v${version}-darwin-universal"

          mkdir -p unpack "dist/${universal_package}"
          tar -xzf "incoming/aarch64/${arm_package}.tar.gz" -C unpack
          tar -xzf "incoming/x86_64/${x64_package}.tar.gz" -C unpack

          lipo -create \
            -arch arm64 "unpack/${arm_package}/${BIN_NAME}" \
            -arch x86_64 "unpack/${x64_package}/${BIN_NAME}" \
            -output "dist/${universal_package}/${BIN_NAME}"

          cp LICENSE README.md "dist/${universal_package}/"
          chmod +x "dist/${universal_package}/${BIN_NAME}"

          tar -C dist -czf "dist/${universal_package}.tar.gz" "${universal_package}"

      - uses: actions/upload-artifact@v4
        with:
          name: amr-v${{ needs.meta.outputs.version }}-darwin-universal
          path: dist/amr-v${{ needs.meta.outputs.version }}-darwin-universal.tar.gz
          if-no-files-found: error

  build-linux-x86_64-musl:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build x86_64 Linux musl binary
        env:
          CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Package x86_64 Linux musl binary
        shell: bash
        run: |
          version="${{ needs.meta.outputs.version }}"
          package="amr-v${version}-linux-x86_64-musl"

          mkdir -p "dist/${package}"
          cp "target/x86_64-unknown-linux-musl/release/${BIN_NAME}" "dist/${package}/${BIN_NAME}"
          cp LICENSE README.md "dist/${package}/"
          chmod +x "dist/${package}/${BIN_NAME}"

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - uses: actions/upload-artifact@v4
        with:
          name: amr-v${{ needs.meta.outputs.version }}-linux-x86_64-musl
          path: dist/amr-v${{ needs.meta.outputs.version }}-linux-x86_64-musl.tar.gz
          if-no-files-found: error

  collect-artifacts:
    needs:
      - meta
      - build-darwin-aarch64
      - build-darwin-x86_64
      - build-darwin-universal
      - build-linux-x86_64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: amr-v${{ needs.meta.outputs.version }}-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundles-v${{ needs.meta.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - meta
      - collect-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-bundles-v${{ needs.meta.outputs.version }}
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
